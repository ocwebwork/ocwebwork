<style>
  :root{
    --purple:#8A39AD; --purple-dk:#6E2C8C; --plum:#2A1238; --green:#5DA63A; --line:#E6DCEE;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#ECE4F2;font-family:"Mulish",system-ui,sans-serif;color:#241229;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 18px;-webkit-font-smoothing:antialiased;}
  .panel{width:100%;max-width:860px;}
  .panel-head{text-align:center;margin-bottom:16px;}
  .panel-head .kk{font-weight:800;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--purple-dk);}
  .panel-head h1{font-family:"Fraunces",serif;font-weight:700;font-size:clamp(22px,4vw,30px);margin:8px 0 0;}
  .panel-head p{font-size:14px;color:#6b5d70;margin:8px 0 0;}

  .ba{border:1.5px solid var(--plum);border-radius:12px;overflow:hidden;background:var(--plum);box-shadow:0 24px 50px -28px rgba(42,18,56,.6);}
  .ba-chrome{display:flex;align-items:center;gap:7px;padding:10px 13px;background:var(--plum);border-bottom:1px solid #3f2750;}
  .ba-dot{width:10px;height:10px;border-radius:50%;background:#5a4168;}
  .ba-url{margin-left:8px;font-weight:600;font-size:11.5px;color:#b59cc4;background:#3a2350;padding:4px 11px;border-radius:4px;flex:1;}
  .ba-tag{font-weight:800;font-size:10px;letter-spacing:.08em;color:var(--green);}

  /* stage holds two stacked images */
  .ba-stage{position:relative;aspect-ratio:2880/1640;background:#fff;user-select:none;overflow:hidden;}
  .ba-layer{position:absolute;inset:0;overflow:hidden;}
  .ba-layer img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
  .ba-after{z-index:1;}
  .ba-before{z-index:2;clip-path:inset(0 0 0 var(--split,50%));}

  .ba-pin{position:absolute;top:12px;z-index:5;font-weight:800;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:3px;}
  .pin-before{right:12px;background:#c0392b;color:#fff;}
  .pin-after{left:12px;background:var(--plum);color:#8FD15F;}
  .ba-range{position:absolute;inset:0;width:100%;height:100%;z-index:10;margin:0;opacity:0;cursor:ew-resize;}
  .ba-handle{position:absolute;top:0;bottom:0;left:var(--split,50%);width:3px;background:var(--green);z-index:6;transform:translateX(-1.5px);pointer-events:none;}
  .ba-knob{position:absolute;top:50%;left:var(--split,50%);transform:translate(-50%,-50%);z-index:7;width:44px;height:44px;border-radius:50%;background:var(--green);border:3px solid #fff;display:flex;align-items:center;justify-content:center;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .ba-knob svg{width:21px;height:21px;color:#143000;}
  .ba-cap{font-weight:600;font-size:12px;color:#6b5d70;text-align:center;padding:11px;background:#fff;border-top:1px solid var(--line);}
</style>
